<svg width="720" viewBox="0 0 720 740" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="740" fill="#0D1117"/>

  <!-- ── OFFLINE ZONE ── -->
  <rect x="30" y="20" width="660" height="390" rx="16" fill="#1A1030" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.5"/>
  <text x="52" y="48" font-size="10" font-weight="600" letter-spacing="2" fill="#A78BFA" opacity="0.8">OFFLINE — TRAINING PIPELINE  ·  notebooks/EDA.ipynb</text>

  <!-- Raw Data -->
  <rect x="250" y="62" width="220" height="54" rx="10" fill="#1E1535" stroke="#7C3AED" stroke-width="0.8"/>
  <text x="360" y="85" font-size="13" font-weight="600" text-anchor="middle" fill="#E2D9FF">Raw Excel data</text>
  <text x="360" y="103" font-size="11" text-anchor="middle" fill="#9D8FC4">5,630 customers · 20 features</text>

  <line x1="360" y1="116" x2="360" y2="138" stroke="#7C3AED" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arr)"/>

  <!-- EDA -->
  <rect x="250" y="138" width="220" height="54" rx="10" fill="#1E1535" stroke="#7C3AED" stroke-width="0.8"/>
  <text x="360" y="161" font-size="13" font-weight="600" text-anchor="middle" fill="#E2D9FF">EDA &amp; data quality</text>
  <text x="360" y="179" font-size="11" text-anchor="middle" fill="#9D8FC4">Nulls · outliers · class imbalance</text>

  <line x1="360" y1="192" x2="360" y2="214" stroke="#7C3AED" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arr)"/>

  <!-- Feature Engineering -->
  <rect x="250" y="214" width="220" height="54" rx="10" fill="#0E3A33" stroke="#0D9488" stroke-width="0.8"/>
  <text x="360" y="237" font-size="13" font-weight="600" text-anchor="middle" fill="#99F6E4">Feature engineering</text>
  <text x="360" y="255" font-size="11" text-anchor="middle" fill="#5EEAD4">6 new features · r = 0.449 with churn</text>

  <!-- "4 models benchmarked" label -->
  <line x1="360" y1="268" x2="360" y2="290" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.35"/>
  <text x="360" y="304" font-size="10" text-anchor="middle" fill="#7C3AED" opacity="0.65" letter-spacing="0.5">4 models benchmarked</text>

  <!-- Fan-out arrows to 4 model boxes -->
  <path d="M260 288 L111 316" fill="none" stroke="#7C3AED" stroke-width="1.1" stroke-opacity="0.4" marker-end="url(#arr)"/>
  <path d="M305 288 L251 316" fill="none" stroke="#7C3AED" stroke-width="1.1" stroke-opacity="0.4" marker-end="url(#arr)"/>
  <path d="M415 288 L469 316" fill="none" stroke="#7C3AED" stroke-width="1.1" stroke-opacity="0.4" marker-end="url(#arr)"/>
  <path d="M450 288 L590 310" fill="none" stroke="#7C3AED" stroke-width="1.1" stroke-opacity="0.4" marker-end="url(#arr)"/>

  <!-- Model box 1 -->
  <rect x="52"  y="316" width="118" height="46" rx="8" fill="#1A1A2E" stroke="#3D3660" stroke-width="0.7"/>
  <text x="111" y="335" font-size="12" font-weight="600" text-anchor="middle" fill="#9090B8">Logistic reg.</text>
  <text x="111" y="352" font-size="11" text-anchor="middle" fill="#606080">AUC 0.88</text>

  <!-- Model box 2 -->
  <rect x="188" y="316" width="118" height="46" rx="8" fill="#1A1A2E" stroke="#3D3660" stroke-width="0.7"/>
  <text x="247" y="335" font-size="12" font-weight="600" text-anchor="middle" fill="#9090B8">Decision tree</text>
  <text x="247" y="352" font-size="11" text-anchor="middle" fill="#606080">AUC 0.94</text>

  <!-- Model box 3 -->
  <rect x="356" y="316" width="118" height="46" rx="8" fill="#1A1A2E" stroke="#3D3660" stroke-width="0.7"/>
  <text x="415" y="335" font-size="12" font-weight="600" text-anchor="middle" fill="#9090B8">Random forest</text>
  <text x="415" y="352" font-size="11" text-anchor="middle" fill="#606080">AUC 0.99</text>

  <!-- XGBoost winner -->
  <rect x="530" y="308" width="140" height="62" rx="10" fill="#0E3A33" stroke="#0D9488" stroke-width="1.3"/>
  <text x="600" y="328" font-size="13" font-weight="600" text-anchor="middle" fill="#99F6E4">XGBoost  ✓</text>
  <text x="600" y="346" font-size="11" text-anchor="middle" fill="#5EEAD4">AUC 0.9989</text>
  <text x="600" y="361" font-size="11" text-anchor="middle" fill="#5EEAD4">98.76% accuracy</text>

  <!-- Winner → pkl -->
  <path d="M600 370 L600 394 L470 394" fill="none" stroke="#0D9488" stroke-width="1.5" stroke-opacity="0.65" marker-end="url(#arr)"/>

  <!-- pkl artifact -->
  <rect x="250" y="376" width="220" height="46" rx="10" fill="#2D1F00" stroke="#D97706" stroke-width="0.9"/>
  <text x="360" y="396" font-size="13" font-weight="600" text-anchor="middle" fill="#FCD34D">best_churn_model.pkl</text>
  <text x="360" y="413" font-size="11" text-anchor="middle" fill="#F59E0B">saved to  src/</text>

  <!-- ── BRIDGE ── -->
  <line x1="360" y1="422" x2="360" y2="462" stroke="#4B5563" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="380" y="446" font-size="10" fill="#6B7280">model.pkl loaded at startup</text>

  <!-- ── ONLINE ZONE ── -->
  <rect x="30" y="466" width="660" height="252" rx="16" fill="#0D1E35" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="52" y="492" font-size="10" font-weight="600" letter-spacing="2" fill="#93C5FD" opacity="0.8">ONLINE — STREAMLIT APP  ·  Streamlit Cloud  /  Docker</text>

  <!-- User Input -->
  <rect x="250" y="502" width="220" height="46" rx="10" fill="#0F2440" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="360" y="522" font-size="13" font-weight="600" text-anchor="middle" fill="#BFDBFE">User input</text>
  <text x="360" y="539" font-size="11" text-anchor="middle" fill="#93C5FD">Single customer or CSV upload</text>

  <line x1="360" y1="548" x2="360" y2="570" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arr)"/>

  <!-- Inference -->
  <rect x="250" y="570" width="220" height="46" rx="10" fill="#0F2440" stroke="#2563EB" stroke-width="1.2"/>
  <text x="360" y="590" font-size="13" font-weight="600" text-anchor="middle" fill="#BFDBFE">XGBoost inference</text>
  <text x="360" y="607" font-size="11" text-anchor="middle" fill="#93C5FD">Churn probability  0 – 100 %</text>

  <!-- 5 fan-out arrows -->
  <path d="M278 616 L100 638 L100 658" fill="none" stroke="#3B82F6" stroke-width="1.1" stroke-opacity="0.5" marker-end="url(#arr)"/>
  <path d="M315 616 L228 638 L228 658" fill="none" stroke="#3B82F6" stroke-width="1.1" stroke-opacity="0.5" marker-end="url(#arr)"/>
  <line x1="360" y1="616" x2="360" y2="658" stroke="#3B82F6" stroke-width="1.1" stroke-opacity="0.5" marker-end="url(#arr)"/>
  <path d="M405 616 L492 638 L492 658" fill="none" stroke="#3B82F6" stroke-width="1.1" stroke-opacity="0.5" marker-end="url(#arr)"/>
  <path d="M442 616 L612 638 L612 658" fill="none" stroke="#3B82F6" stroke-width="1.1" stroke-opacity="0.5" marker-end="url(#arr)"/>

  <!-- Output box 1 — SHAP -->
  <rect x="44"  y="658" width="112" height="50" rx="8" fill="#1E1040" stroke="#7C3AED" stroke-width="0.8"/>
  <text x="100" y="677" font-size="12" font-weight="600" text-anchor="middle" fill="#C4B5FD">SHAP</text>
  <text x="100" y="694" font-size="10" text-anchor="middle" fill="#8B72D6">Feature attribution</text>

  <!-- Output box 2 — Priority -->
  <rect x="172" y="658" width="112" height="50" rx="8" fill="#0A2E27" stroke="#0D9488" stroke-width="0.8"/>
  <text x="228" y="677" font-size="12" font-weight="600" text-anchor="middle" fill="#6EE7B7">Priority score</text>
  <text x="228" y="694" font-size="10" text-anchor="middle" fill="#34D399">Revenue × risk</text>

  <!-- Output box 3 — What-If -->
  <rect x="304" y="658" width="112" height="50" rx="8" fill="#2D0A12" stroke="#F43F5E" stroke-width="0.8"/>
  <text x="360" y="677" font-size="12" font-weight="600" text-anchor="middle" fill="#FDA4AF">What-If</text>
  <text x="360" y="694" font-size="10" text-anchor="middle" fill="#FB7185">12 parameters</text>

  <!-- Output box 4 — Budget -->
  <rect x="436" y="658" width="112" height="50" rx="8" fill="#2D1700" stroke="#D97706" stroke-width="0.8"/>
  <text x="492" y="677" font-size="12" font-weight="600" text-anchor="middle" fill="#FCD34D">Budget optimizer</text>
  <text x="492" y="694" font-size="10" text-anchor="middle" fill="#FBBF24">224% ROI proven</text>

  <!-- Output box 5 — Batch -->
  <rect x="556" y="658" width="112" height="50" rx="8" fill="#0A1E35" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="612" y="677" font-size="12" font-weight="600" text-anchor="middle" fill="#BFDBFE">Batch CSV</text>
  <text x="612" y="694" font-size="10" text-anchor="middle" fill="#93C5FD">Download results</text>
</svg>
